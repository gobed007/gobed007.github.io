   <script>
        function tampilkanJam() {
            const waktu = new Date();
            // Mengambil jam, menit, dan detik
            let jam = waktu.getHours();
            let menit = waktu.getMinutes();
            let detik = waktu.getSeconds();

            // Tambahkan angka 0 di depan jika nilai kurang dari 10
            jam = jam < 10 ? "0" + jam : jam;
            menit = menit < 10 ? "0" + menit : menit;

            // Gabungkan menjadi format HH:MM:SS
            const waktuSekarang = jam + ":" + menit;

            // Tampilkan ke elemen HTML
            document.getElementById("jam").innerHTML = waktuSekarang;
        }

        // Perbarui jam setiap 1000 milidetik (1 detik)
        setInterval(tampilkanJam, 60000);
        
        // Panggil fungsi sekali agar jam langsung muncul saat halaman dimuat
        tampilkanJam();
    </script>
<script>
        // Fungsi untuk menampilkan hari dan tanggal
        function tampilkanTanggal() {
            const hariArray = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const bulanArray = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

            const date = new Date();
            const hari = hariArray[date.getDay()];
            const tanggal = date.getDate();
            const bulan = bulanArray[date.getMonth()];
            const tahun = date.getFullYear();

            // Gabungkan menjadi format: Hari, Tanggal Bulan Tahun
            const hasilTanggal = `${hari}, ${tanggal} ${bulan} ${tahun}`;

            // Masukkan ke dalam elemen HTML
            document.getElementById('tanggal').textContent = hasilTanggal;
        }

        // Panggil fungsi saat halaman dimuat
        tampilkanTanggal();
    </script>
